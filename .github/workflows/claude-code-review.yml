name: Claude Code Review

on:
  pull_request_target:
    branches:
      - main
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "**/*.js"
    #   - "**/*.ts"
    #   - "**/*.mjs"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-author:
    if: >-
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.title, '[skip-claude]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_trusted: ${{ steps.check.outputs.is_trusted }}
    steps:
      - id: check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea #v7.0.1
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              const trusted = ['admin', 'maintain', 'write'].includes(data.permission);
              core.info(`User ${author}: permission=${data.permission}, trusted=${trusted}`);
              core.setOutput('is_trusted', trusted ? 'true' : 'false');
            } catch (e) {
              core.warning(`Failed to check permission for ${author}: ${e.message}`);
              core.setOutput('is_trusted', 'false');
            }

  claude-review:
    needs: check-author
    if: needs.check-author.outputs.is_trusted == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1
        with:
          fetch-depth: 50

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 #5.0.0
        with:
          role-to-assume: ${{ secrets.TELEGEN_AWS_ASSUME_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@0766301cba8671db92e3025984e2fd038ad48ff7 #v1.0.104
        with:
          use_bedrock: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model us.anthropic.claude-opus-4-6-v1 --allowedTools "Read,Grep,Glob,Bash(gh pr diff ${{ github.event.pull_request.number }}),Bash(gh pr diff ${{ github.event.pull_request.number }} *),Bash(gh pr view ${{ github.event.pull_request.number }}),Bash(gh pr view ${{ github.event.pull_request.number }} *),Bash(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments*),Bash(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews*),Bash(git diff *),Bash(git log *),Bash(git show *)"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in this repository for bugs, security issues, and code quality. Post your findings as inline review comments on the relevant lines of this PR only. Do not modify, comment on, or interact with any other PR.
